spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
#    url: jdbc:mysql://localhost:3306/key_feed_identity?&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
#    url: jdbc:mysql://localhost:3306/key_feed_test?&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&rewriteBatchedStatements=true
    url: jdbc:mysql://localhost:3306/test?&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&rewriteBatchedStatements=true
    username: root
    password: 1111
    hikari:
      maximum-pool-size: 25  # 크롤러 스레드(20) + 여유분
      minimum-idle: 5

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms          # 연결 타임아웃
      lettuce:
        pool:
          max-active: 10       # 최대 커넥션 수
          max-idle: 5          # 최대 유휴 커넥션 수
          min-idle: 2          # 최소 유휴 커넥션 수
          max-wait: 1000ms     # 커넥션 대기 최대 시간

jwt:
  secret: ${jwt_key}
  expiration_time: 1209600000          # 14일(로컬은 길게)
  refresh_expiration_time: 1209600000  # 14일

cors:
  allowed-origins: http://localhost:3000

logging:
  level:
    p6spy: info
    org.hibernate.SQL: off
    org.hibernate.orm.jdbc.bind: off
#    com.zaxxer.hikari: DEBUG
#    com.zaxxer.hikari.HikariConfig: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,info,metrics,env,loggers
  metrics:
    tags:
      application: key-feed-monolithic-backend
  endpoint:
    health:
      show-details: always

notification:
  keyword-scan:
    pool-size: 4
