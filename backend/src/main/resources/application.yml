server:
  port: 8080

spring:
  application:
    name: key-feed-monolithic-backend

  profiles:
    active: prod

  jpa:
    hibernate:
      ddl-auto: validate

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

  mail:
    host: smtp.gmail.com
    port: 587
    username: ENC(F/qVboiQE87bFp73aVzXTYcBK6QV6jiIkMxz0Q3qFA4=)
    password: ENC(HAgjsskaK10+kw+Eo2paNTlyvZj0SbG+ZtDa68QEX4M=)
    properties:
      mail:
        smtp:
          auth: true
          timeout: 5000
          starttls:
            enable: true
    max_attempts: 5
    lock_minutes: 15
    expire_minutes: 5

jasypt:
  encryptor:
    password: ${jasypt_key}
    bean: jasyptEncryptor

jwt:
  secret: ${jwt_key}
  expiration_time: 600000              # 10?
  refresh_expiration_time: 1209600000  # 14?

app:
  limits:
    keyword-max-count: 3
    keyword-subscriber-max-count: 10
    folder-max-count: 3
    folder-subscriber-max-count: 20

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

