services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090" # 프로메테우스의 기본 포트번호
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml # 프로메테우스 설정 파일
    networks:
      - mysql-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000" # 그라파나의 기본 포트 번호
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml
      - ./logs:/var/log/spring  # Spring Boot 로그 경로
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  mysqld-exporter:
    image: prom/mysqld-exporter
    container_name: mysqld-exporter
    ports:
      - "9104:9104"
    volumes:
      - ./.my.cnf:/etc/mysqld_exporter/.my.cnf
    command:
      - "--config.my-cnf=/etc/mysqld_exporter/.my.cnf"
    networks:
      - mysql-network
    restart: unless-stopped

volumes:
  grafana-data:
  loki-data:

# ✅ 추가
networks:
  mysql-network:
    external: true  # 이미 존재하는 네트워크 사용