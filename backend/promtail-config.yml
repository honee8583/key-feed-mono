server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: spring-boot
    static_configs:
      - targets:
          - localhost
        labels:
          job: spring-boot
          app: my-app           # 앱 이름 (원하는 이름으로 변경)
          env: local            # 환경 (local, dev, prod 등)
          __path__: /var/log/spring/*.log  # 로그 파일 경로
    pipeline_stages:
      - multiline:              # 멀티라인 로그 처리 (예외 스택트레이스)
          firstline: '^\d{4}-\d{2}-\d{2}'
          max_wait_time: 3s
      - regex:
          expression: '^(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d+)\s+\[(?P<thread>[^\]]+)\]\s+(?P<level>\w+)\s+(?P<logger>\S+)\s+-\s+(?P<message>.+)$'
      - labels:
          level:                # 로그 레벨 (INFO, WARN, ERROR 등) 라벨로 추출
          logger:               # 로거 이름 라벨로 추출
